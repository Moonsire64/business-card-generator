<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; text-rendering:geometricPrecision; }

        :root {
            --cream: #f3f0e5;
            --ink: #0a0a0a;
            --accent: #ff3e00;
            --accent-dark: #b32b00;
            --layout-header-height: 180px;
            --layout-bio-height: 360px;
            --layout-skills-height: 110px;
            --layout-footer-height: 60px;
            --layout-rib-width: 70px;
            --layout-padding-h: 60px;
            --layout-padding-v: 20px;
            --canvas-width: 595px;
            --canvas-height: 842px;
        }

        html, body { height: 100%; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }

        .sidebar {
            width: 360px;
            flex-shrink: 0;
            padding: 40px;
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar-title { font-weight: 900; color: var(--accent); }

        input, textarea {
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            border-radius: 4px;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 100px; }

        .export-btn {
            margin-top: 10px;
            padding: 20px;
            background: var(--accent);
            color: #fff;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: opacity 0.2s;
        }
        .export-btn:hover  { opacity: 0.9; }
        .export-btn:active { transform: scale(0.98); }

        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            overflow: auto;
            padding: 20px;
        }

        .watermark {
            position: absolute;
            top: 45%; left: 60%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 180px;
            font-weight: bold;
            color: rgba(0,0,0,0.11);
            pointer-events: none;
            white-space: nowrap;
            z-index: 1;
            font-family: Helvetica, sans-serif;
        }

        #canvas {
            width: var(--canvas-width);
            height: var(--canvas-height);
            background: var(--ink);
            display: grid;
            grid-template-columns: var(--layout-rib-width) 1fr;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .rib {
            background: linear-gradient(180deg,
                var(--accent-dark) 0px, var(--accent-dark) 130px,
                var(--accent) 130px, var(--accent) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset -8px 0 20px rgba(0,0,0,0.4), inset 4px 0 10px rgba(255,255,255,0.1);
        }
        .rib::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        .rib::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .rib-company {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%) rotate(-90deg);
            white-space: nowrap;
            font-family: 'JetBrains Mono';
            font-size: 9px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .main {
            background: var(--cream);
            height: var(--canvas-height);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            height: var(--layout-header-height);
            padding: 60px var(--layout-padding-h) 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #display-name {
            font-family: 'Archivo', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: keep-all;
            font-weight: 900;
            font-stretch: 125%;
        }

        #display-field {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-top: 15px;
            display: block;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--ink);
            margin: 20px var(--layout-padding-h) 0;
            flex-shrink: 0;
        }

        .body-content {
            flex: 1;
            padding: var(--layout-padding-v) var(--layout-padding-h) 40px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #bio-container {
            height: var(--layout-bio-height);
            border-left: 10px solid var(--ink);
            padding-left: 30px;
            padding-bottom: 15px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #bio-lead { font-weight: 900; color: var(--ink); display: block; line-height: 1.2; margin-bottom: 8px; }
        #bio-body { font-weight: 400; color: #333; line-height: 1.4; display: block; }

        #skills-container { height: var(--layout-skills-height); display: flex; align-items: flex-start; padding-bottom: 10px; }
        .skill-list { display: flex; flex-wrap: wrap; gap: 6px; width: 100%; }

        .skill-pill {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            background: var(--ink);
            color: var(--cream);
            padding: 5px 10px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .footer {
            height: var(--layout-footer-height);
            background: var(--ink);
            color: var(--cream);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            padding: 8px var(--layout-padding-h);
            font-family: 'JetBrains Mono';
            font-size: 8px;
            flex-shrink: 0;
            row-gap: 2px;
            column-gap: 12px;
        }

        #display-footer-email    { grid-column:1; grid-row:1; justify-self:start; word-break:break-word; }
        #display-footer-linkedin { grid-column:1; grid-row:2; justify-self:start; word-break:break-word; color:var(--cream); text-decoration:none; }
        #display-footer-linkedin:hover { text-decoration:underline; }
        #display-footer-phone    { grid-column:2; grid-row:1; justify-self:end; word-break:break-word; }
        #display-footer-location { grid-column:2; grid-row:2; justify-self:end; word-break:break-word; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; overflow-x: hidden; }
            .sidebar { width: 100%; padding: 20px; border-right: none; border-bottom: 1px solid #222; overflow-y: visible; }
            .viewport { overflow: visible; padding: 16px 0; justify-content: flex-start; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">PDF TEMPLATE</div>
        <input type="text"  id="input-name"     placeholder="NAME"                     maxlength="30"  autocomplete="name">
        <input type="text"  id="input-field"    placeholder="FIELD"                    maxlength="30"  autocomplete="off">
        <input type="text"  id="input-company"  placeholder="COMPANY"                  maxlength="50"  autocomplete="organization">
        <input type="email" id="input-email"    placeholder="EMAIL"                    maxlength="65"  autocomplete="email">
        <input type="tel"   id="input-phone"    placeholder="PHONE"                    maxlength="30"  autocomplete="tel">
        <input type="text"  id="input-location" placeholder="LOCATION"                 maxlength="30"  autocomplete="address-level1">
        <input type="text"  id="input-linkedin" placeholder="LINKEDIN"                 maxlength="65">
        <textarea           id="input-bio"      placeholder="PROFESSIONAL STATEMENT"   maxlength="600" rows="10"></textarea>
        <input type="text"  id="input-skills"   placeholder="SKILLS (comma-separated)" maxlength="150">
        <button class="export-btn" id="export-btn">EXPORT PDF</button>
    </aside>

    <main class="viewport">
        <div id="canvas">
            <div class="watermark">DEMO</div>
            <div class="rib">
                <div class="rib-company" id="display-company"></div>
            </div>
            <div class="main">
                <header class="header" id="header-box">
                    <div id="display-name"></div>
                    <span id="display-field"></span>
                </header>
                <div class="divider"></div>
                <div class="body-content">
                    <section id="bio-container">
                        <span id="bio-lead"></span>
                        <span id="bio-body"></span>
                    </section>
                    <section id="skills-container">
                        <div class="skill-list" id="display-skills"></div>
                    </section>
                </div>
                <footer class="footer">
                    <span id="display-footer-email"></span>
                    <span id="display-footer-phone"></span>
                    <a    id="display-footer-linkedin" href="" target="_blank" rel="noopener noreferrer"></a>
                    <span id="display-footer-location"></span>
                </footer>
            </div>
        </div>
    </main>

    <script>
        const CANVAS_W = 595;
        const CANVAS_H = 842;

        const config = {
            name:   { minSize: 10, maxSize: 47, minWidth: 120, maxHeight: 110 },
            bio:    { minSize: 4, baseSize: 15, maxSize: 50, step: 0.5, containerHeight: 360, leadOffset: 2 },
            skills: { minSize: 6, baseSize: 9, step: 0.5 },
            sizing: { maxAttempts: 100 },
        };

        const el = {
            inp: {
                name:     document.getElementById('input-name'),
                field:    document.getElementById('input-field'),
                company:  document.getElementById('input-company'),
                email:    document.getElementById('input-email'),
                phone:    document.getElementById('input-phone'),
                location: document.getElementById('input-location'),
                linkedin: document.getElementById('input-linkedin'),
                bio:      document.getElementById('input-bio'),
                skills:   document.getElementById('input-skills'),
            },
            out: {
                name:     document.getElementById('display-name'),
                field:    document.getElementById('display-field'),
                company:  document.getElementById('display-company'),
                bioLead:  document.getElementById('bio-lead'),
                bioBody:  document.getElementById('bio-body'),
                skills:   document.getElementById('display-skills'),
                email:    document.getElementById('display-footer-email'),
                phone:    document.getElementById('display-footer-phone'),
                linkedin: document.getElementById('display-footer-linkedin'),
                location: document.getElementById('display-footer-location'),
            },
            con: {
                header: document.getElementById('header-box'),
                bio:    document.getElementById('bio-container'),
                skills: document.getElementById('skills-container'),
            },
            canvas:    document.getElementById('canvas'),
            exportBtn: document.getElementById('export-btn'),
        };

        // ── Mobile preview scaling ────────────────────────────────────────────
        function scaleCanvas() {
            if (window.innerWidth > 768) { el.canvas.style.zoom = ''; return; }
            const viewport = el.canvas.parentElement;
            el.canvas.style.zoom = '';
            const available = viewport.getBoundingClientRect().width;
            const zoom = Math.min(1, Math.floor((available / CANVAS_W) * 1000) / 1000) * 0.98;
            el.canvas.style.zoom = zoom;
        }
        window.addEventListener('resize', scaleCanvas);

        // ── Text fitting ──────────────────────────────────────────────────────
        function splitBio(text) {
            if (!text) return ['', ''];
            const sentences = text.split(/(?<=[.!?])\s+/);
            const lead = sentences[0] || '';
            const body = sentences.slice(1).join(' ').trim();
            return [lead, body ? ' ' + body : ''];
        }

        function fitName() {
            const n = el.out.name, h = el.con.header;
            let size = config.name.minSize;
            n.style.fontSize = size + 'px';
            while (n.scrollWidth <= h.clientWidth - config.name.minWidth &&
                   n.scrollHeight < config.name.maxHeight &&
                   size < config.name.maxSize) {
                n.style.fontSize = (++size) + 'px';
            }
            n.style.fontSize = (size - 1) + 'px';
        }

        function fitBio() {
            const lead = el.out.bioLead, body = el.out.bioBody, box = el.con.bio;
            const [l, b] = splitBio(el.inp.bio.value);
            lead.textContent = l;
            body.textContent = b;
            if (!l) return;
            const set = s => { body.style.fontSize = s + 'px'; lead.style.fontSize = (s + config.bio.leadOffset) + 'px'; };
            let size = config.bio.baseSize, a = 0;
            set(size);
            while (box.scrollHeight > config.bio.containerHeight && size > config.bio.minSize && a++ < config.sizing.maxAttempts) set(size -= config.bio.step);
            a = 0;
            while (box.scrollHeight <= config.bio.containerHeight && size < config.bio.maxSize && a++ < config.sizing.maxAttempts) set(size += config.bio.step);
            set(size - config.bio.step);
        }

        function fitSkills() {
            const list = el.out.skills, box = el.con.skills;
            list.innerHTML = '';
            (el.inp.skills.value || '').split(',').forEach(s => {
                const t = s.trim();
                if (!t) return;
                const pill = document.createElement('span');
                pill.className = 'skill-pill';
                pill.textContent = t.toUpperCase();
                list.appendChild(pill);
            });
            let size = config.skills.baseSize, a = 0;
            list.style.fontSize = size + 'px';
            while (list.scrollHeight > box.clientHeight && size > config.skills.minSize && a++ < config.sizing.maxAttempts)
                list.style.fontSize = (size -= config.skills.step) + 'px';
        }

        function update() {
            el.out.name.textContent     = el.inp.name.value.toUpperCase();
            el.out.field.textContent    = el.inp.field.value.toUpperCase();
            el.out.company.textContent  = el.inp.company.value.toUpperCase();
            el.out.email.textContent    = el.inp.email.value;
            el.out.phone.textContent    = el.inp.phone.value;
            el.out.location.textContent = el.inp.location.value;
            const li = el.inp.linkedin.value;
            el.out.linkedin.textContent = li;
            el.out.linkedin.href = li ? (li.startsWith('http') ? li : 'https://' + li) : '';
            fitName(); fitBio(); fitSkills();
        }

        let debounceTimer;
        const debouncedUpdate = () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(update, 100); };

        // ── PDF export ────────────────────────────────────────────────────────
        // The preview zoom is a CSS property on the element. For capture we
        // move the canvas temporarily into a fixed full-size wrapper that
        // counteracts any zoom, capture it, then put it back. The preview
        // element itself never changes size or content.
        async function generatePDF() {
            if (!el.inp.name.value?.trim() || !el.inp.field.value?.trim()) {
                alert('Please fill in at least Name and Field');
                return;
            }

            const fileName = el.inp.name.value.trim() + '.pdf';
            const btn = el.exportBtn;
            btn.textContent = 'GENERATING…';
            btn.disabled = true;

            // Save current zoom and position in DOM
            const prevZoom   = el.canvas.style.zoom;
            const parent     = el.canvas.parentNode;
            const nextSibling = el.canvas.nextSibling;

            // Create a temporary wrapper positioned off-screen at exactly
            // CANVAS_W × CANVAS_H with no zoom, no clipping
            // Scroll to top first, then place wrapper at absolute (0,0)
            // so html2canvas sees the element at document origin with no offset
            window.scrollTo(0, 0);
            await new Promise(r => requestAnimationFrame(r));

            const wrapper = document.createElement('div');
            wrapper.style.cssText = `
                position: absolute;
                top: 0; left: 0;
                width: ${CANVAS_W}px;
                height: ${CANVAS_H}px;
                overflow: hidden;
                z-index: 99999;
                opacity: 0;
                pointer-events: none;
            `;
            document.body.appendChild(wrapper);

            el.canvas.style.zoom = '1';
            wrapper.appendChild(el.canvas);

            await new Promise(r => setTimeout(r, 80));

            try {
                const captured = await html2canvas(el.canvas, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#f3f0e5',
                    width:  CANVAS_W,
                    height: CANVAS_H,
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: 0,
                });

                const imgData = captured.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ unit: 'pt', format: [CANVAS_W, CANVAS_H], orientation: 'portrait' });
                pdf.addImage(imgData, 'PNG', 0, 0, CANVAS_W, CANVAS_H, '', 'FAST');
                pdf.save(fileName);

            } catch (err) {
                console.error(err);
                alert('PDF generation failed. Please try again.');
            } finally {
                // Put the canvas back exactly where it was
                el.canvas.style.zoom = prevZoom;
                if (nextSibling) parent.insertBefore(el.canvas, nextSibling);
                else parent.appendChild(el.canvas);
                document.body.removeChild(wrapper);

                btn.textContent = 'EXPORT PDF';
                btn.disabled = false;
            }
        }

        Object.values(el.inp).forEach(i => i.addEventListener('input', debouncedUpdate));
        el.exportBtn.addEventListener('click', generatePDF);
        update();
        scaleCanvas();
    </script>
</body>
</html>
