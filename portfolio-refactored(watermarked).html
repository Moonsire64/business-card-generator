<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portfolio One-Pager Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f3f0e5;
            --ink: #0a0a0a;
            --accent: #ff3e00;
            --accent-dark: #b32b00;
            --layout-padding-h: 60px;
        }

        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 320px;
            padding: 30px;
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar-title {
            font-weight: 900;
            color: #ff3e00;
            font-size: 12px;
            margin-bottom: 5px;
        }

        input, textarea {
            background: #111;
            border: 1px solid #222;
            padding: 10px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            border-radius: 4px;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: #ff3e00;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .export-btn {
            margin-top: 10px;
            padding: 15px;
            background: #ff3e00;
            color: #fff;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            font-size: 14px;
        }

        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            padding: 20px;
            overflow: auto;
        }

        /* CRITICAL: Fixed canvas size, wrapper handles mobile scroll */
        .canvas-wrapper {
            display: block;
        }

        #canvas {
            width: 595px;
            height: 842px;
            background: #0a0a0a;
            display: grid;
            grid-template-columns: 70px 1fr;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 140px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.08);
            pointer-events: none;
            white-space: nowrap;
            z-index: 1;
            font-family: Arial;
        }

        .rib {
            background: linear-gradient(180deg, #b32b00 0px, #b32b00 130px, #ff3e00 130px, #ff3e00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .rib-company {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            white-space: nowrap;
            font-family: 'JetBrains Mono';
            font-size: 9px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            font-weight: 700;
        }

        .main {
            background: #f3f0e5;
            height: 842px;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 180px;
            padding: 60px 60px 25px;
        }

        #display-name {
            font-family: 'Archivo', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #0a0a0a;
            font-weight: 900;
            font-stretch: 125%;
        }

        #display-field {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            letter-spacing: 2px;
            color: #ff3e00;
            margin-top: 15px;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #0a0a0a;
            margin: 0 60px;
        }

        .body-content {
            flex: 1;
            padding: 20px 60px 40px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
        }

        #bio-container {
            height: 360px;
            border-left: 10px solid #0a0a0a;
            padding-left: 30px;
            margin-bottom: 40px;
        }

        #bio-lead {
            font-weight: 900;
            color: #0a0a0a;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        #bio-body {
            font-weight: 400;
            color: #333;
            line-height: 1.4;
        }

        #skills-container {
            height: 110px;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-pill {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            background: #0a0a0a;
            color: #f3f0e5;
            padding: 5px 10px;
            text-transform: uppercase;
            font-size: 9px;
            white-space: nowrap;
        }

        .footer {
            height: 60px;
            background: #0a0a0a;
            color: #f3f0e5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 8px 60px;
            font-family: 'JetBrains Mono';
            font-size: 8px;
            gap: 4px 12px;
        }

        #display-footer-email { grid-column: 1; grid-row: 1; text-align: left; }
        #display-footer-linkedin { grid-column: 1; grid-row: 2; text-align: left; color: #f3f0e5; text-decoration: none; }
        #display-footer-phone { grid-column: 2; grid-row: 1; text-align: right; }
        #display-footer-location { grid-column: 2; grid-row: 2; text-align: right; }

        /* Mobile: horizontal scroll only, no scaling of canvas */
        @media (max-width: 700px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid #222;
            }
            .preview-area {
                justify-content: flex-start;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">PROFILE</div>
        <input type="text" id="input-name" placeholder="NAME">
        <input type="text" id="input-field" placeholder="FIELD">
        <input type="text" id="input-company" placeholder="COMPANY">
        <input type="email" id="input-email" placeholder="EMAIL">
        <input type="tel" id="input-phone" placeholder="PHONE">
        <input type="text" id="input-location" placeholder="LOCATION">
        <input type="text" id="input-linkedin" placeholder="LINKEDIN">
        <textarea id="input-bio" placeholder="PROFESSIONAL STATEMENT" rows="8"></textarea>
        <input type="text" id="input-skills" placeholder="SKILLS (comma-separated)">
        <button class="export-btn" id="export-btn">EXPORT PDF</button>
    </aside>

    <div class="preview-area">
        <div class="canvas-wrapper">
            <div id="canvas">
                <div class="watermark">DEMO</div>
                <div class="rib">
                    <div class="rib-company" id="display-company"></div>
                </div>
                <div class="main">
                    <div class="header">
                        <div id="display-name"></div>
                        <span id="display-field"></span>
                    </div>
                    <div class="divider"></div>
                    <div class="body-content">
                        <div id="bio-container">
                            <span id="bio-lead"></span>
                            <span id="bio-body"></span>
                        </div>
                        <div id="skills-container">
                            <div class="skill-list" id="display-skills"></div>
                        </div>
                    </div>
                    <div class="footer">
                        <span id="display-footer-email"></span>
                        <span id="display-footer-phone"></span>
                        <a id="display-footer-linkedin" href="#" target="_blank"></a>
                        <span id="display-footer-location"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const elements = {
            name: document.getElementById('input-name'),
            field: document.getElementById('input-field'),
            company: document.getElementById('input-company'),
            email: document.getElementById('input-email'),
            phone: document.getElementById('input-phone'),
            location: document.getElementById('input-location'),
            linkedin: document.getElementById('input-linkedin'),
            bio: document.getElementById('input-bio'),
            skills: document.getElementById('input-skills'),
            displayName: document.getElementById('display-name'),
            displayField: document.getElementById('display-field'),
            displayCompany: document.getElementById('display-company'),
            displayBioLead: document.getElementById('bio-lead'),
            displayBioBody: document.getElementById('bio-body'),
            displaySkills: document.getElementById('display-skills'),
            displayFooterEmail: document.getElementById('display-footer-email'),
            displayFooterPhone: document.getElementById('display-footer-phone'),
            displayFooterLinkedin: document.getElementById('display-footer-linkedin'),
            displayFooterLocation: document.getElementById('display-footer-location')
        };

        function splitBio(text) {
            if (!text) return ['', ''];
            let sentences = text.match(/[^.!?]+[.!?]+/g);
            if (sentences && sentences.length > 0) {
                let lead = sentences[0].trim();
                let rest = sentences.slice(1).join(' ').trim();
                return [lead, rest ? ' ' + rest : ''];
            }
            return [text, ''];
        }

        function updateDisplay() {
            // Basic text
            elements.displayName.textContent = (elements.name.value || '').toUpperCase();
            elements.displayField.textContent = (elements.field.value || '').toUpperCase();
            elements.displayCompany.textContent = (elements.company.value || '').toUpperCase();
            
            // Bio
            const [lead, body] = splitBio(elements.bio.value);
            elements.displayBioLead.textContent = lead;
            elements.displayBioBody.textContent = body;
            
            // Footer
            elements.displayFooterEmail.textContent = elements.email.value || '';
            elements.displayFooterPhone.textContent = elements.phone.value || '';
            elements.displayFooterLocation.textContent = elements.location.value || '';
            
            let linkedinVal = elements.linkedin.value.trim();
            if (linkedinVal) {
                elements.displayFooterLinkedin.textContent = linkedinVal;
                elements.displayFooterLinkedin.href = linkedinVal.startsWith('http') ? linkedinVal : 'https://' + linkedinVal;
            } else {
                elements.displayFooterLinkedin.textContent = '';
                elements.displayFooterLinkedin.href = '';
            }
            
            // Skills pills
            elements.displaySkills.innerHTML = '';
            let skillsText = elements.skills.value.trim();
            if (skillsText) {
                skillsText.split(',').forEach(skill => {
                    let s = skill.trim();
                    if (s) {
                        let pill = document.createElement('span');
                        pill.className = 'skill-pill';
                        pill.textContent = s.toUpperCase();
                        elements.displaySkills.appendChild(pill);
                    }
                });
            }
            
            // Auto-fit name size
            let nameSize = 32;
            elements.displayName.style.fontSize = nameSize + 'px';
            while (elements.displayName.scrollWidth > 465 && nameSize > 20) {
                nameSize--;
                elements.displayName.style.fontSize = nameSize + 'px';
            }
            while (elements.displayName.scrollWidth < 350 && nameSize < 47) {
                nameSize++;
                elements.displayName.style.fontSize = nameSize + 'px';
            }
            
            // Auto-fit bio
            if (lead) {
                let bioSize = 14;
                elements.displayBioBody.style.fontSize = bioSize + 'px';
                elements.displayBioLead.style.fontSize = (bioSize + 3) + 'px';
                
                let bioContainer = document.getElementById('bio-container');
                let attempts = 0;
                while (bioContainer.scrollHeight > 360 && bioSize > 9 && attempts < 30) {
                    bioSize -= 0.5;
                    elements.displayBioBody.style.fontSize = bioSize + 'px';
                    elements.displayBioLead.style.fontSize = (bioSize + 3) + 'px';
                    attempts++;
                }
            }
        }

        let timeout;
        function handleInput() {
            clearTimeout(timeout);
            timeout = setTimeout(updateDisplay, 50);
        }

        Object.values(elements).forEach(el => {
            if (el && el.addEventListener) el.addEventListener('input', handleInput);
        });

        async function generatePDF() {
            if (!elements.name.value.trim() || !elements.field.value.trim()) {
                alert('Please fill in Name and Field');
                return;
            }
            
            let btn = document.getElementById('export-btn');
            let originalText = btn.textContent;
            btn.textContent = 'GENERATING...';
            btn.disabled = true;
            
            try {
                let canvas = document.getElementById('canvas');
                
                // CRITICAL: Capture with exact dimensions - NO EXTRA PIXELS
                let captured = await html2canvas(canvas, {
                    scale: 2.5,
                    backgroundColor: '#f3f0e5',
                    width: 595,
                    height: 842,
                    windowWidth: 595,
                    windowHeight: 842
                });
                
                // Create a new canvas and crop to exact 595x842 to eliminate white line
                let finalCanvas = document.createElement('canvas');
                finalCanvas.width = 595;
                finalCanvas.height = 842;
                let ctx = finalCanvas.getContext('2d');
                ctx.drawImage(captured, 0, 0, 595, 842);
                
                let imgData = finalCanvas.toDataURL('image/jpeg', 1.0);
                let { jsPDF } = window.jspdf;
                let pdf = new jsPDF({ unit: 'px', format: [595, 842], orientation: 'portrait' });
                pdf.addImage(imgData, 'JPEG', 0, 0, 595, 842);
                
                let fileName = (elements.name.value || 'portfolio').replace(/[^a-z0-9]/gi, '_') + '.pdf';
                pdf.save(fileName);
                
            } catch (err) {
                console.error(err);
                alert('PDF failed: ' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        document.getElementById('export-btn').addEventListener('click', generatePDF);
        updateDisplay();
    </script>
</body>
</html>
