<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portfolio One-Pager Builder — Full‑Page PDF Export</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-rendering: geometricPrecision;
        }

        :root {
            --cream: #f3f0e5;
            --ink: #0a0a0a;
            --accent: #ff3e00;
            --accent-dark: #b32b00;
            --layout-header-height: 180px;
            --layout-bio-height: 360px;
            --layout-skills-height: 110px;
            --layout-footer-height: 60px;
            --layout-rib-width: 70px;
            --layout-padding-h: 60px;
            --layout-padding-v: 20px;
            --canvas-width: 595px;
            --canvas-height: 842px;
        }

        html, body {
            height: 100%;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }

        .sidebar {
            width: 360px;
            flex-shrink: 0;
            padding: 40px;
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-weight: 900;
            color: var(--accent);
        }

        input, textarea {
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            border-radius: 4px;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 400;
        }

        input:focus, textarea:focus { border-color: var(--accent); }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .export-btn {
            margin-top: 10px;
            padding: 20px;
            background: var(--accent);
            color: #fff;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: opacity 0.2s;
        }
        .export-btn:hover  { opacity: 0.9; }
        .export-btn:active { transform: scale(0.98); }

        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            overflow: auto;
            padding: 20px;
        }

        #canvas {
            width: var(--canvas-width);
            height: var(--canvas-height);
            background: var(--ink);
            display: grid;
            grid-template-columns: var(--layout-rib-width) 1fr;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        /* Hidden clone for PDF export — never visible, always at native resolution */
        .pdf-clone-container {
            position: fixed;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .pdf-clone {
            width: 595px;
            height: 842px;
            background: var(--ink);
            display: grid;
            grid-template-columns: 70px 1fr;
        }

        .rib {
            background: linear-gradient(180deg,
                var(--accent-dark) 0px, var(--accent-dark) 130px,
                var(--accent)      130px, var(--accent) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset -8px 0 20px rgba(0,0,0,0.4), inset 4px 0 10px rgba(255,255,255,0.1);
        }
        .rib::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        .rib::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.1) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .rib-company {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%) rotate(-90deg);
            white-space: nowrap;
            font-family: 'JetBrains Mono';
            font-size: 9px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .main {
            background: var(--cream);
            height: 842px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            height: var(--layout-header-height);
            padding: 60px var(--layout-padding-h) 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #display-name, .pdf-display-name {
            font-family: 'Archivo', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--ink);
            white-space: pre-wrap;
            word-break: keep-all;
            font-weight: 900;
            font-stretch: 125%;
        }

        #display-field, .pdf-display-field {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-top: 15px;
            display: block;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--ink);
            margin: 20px var(--layout-padding-h) 0;
            flex-shrink: 0;
        }

        .body-content {
            flex: 1;
            padding: var(--layout-padding-v) var(--layout-padding-h) 40px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #bio-container, .pdf-bio-container {
            height: var(--layout-bio-height);
            border-left: 10px solid var(--ink);
            padding-left: 30px;
            padding-bottom: 15px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #bio-lead, .pdf-bio-lead {
            font-weight: 900;
            color: var(--ink);
            display: block;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        #bio-body, .pdf-bio-body {
            font-weight: 400;
            color: #333;
            line-height: 1.4;
            display: block;
        }

        #skills-container, .pdf-skills-container {
            height: var(--layout-skills-height);
            display: flex;
            align-items: flex-start;
            padding-bottom: 10px;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
        }

        .skill-pill {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            background: var(--ink);
            color: var(--cream);
            padding: 5px 10px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .footer {
            height: var(--layout-footer-height);
            background: var(--ink);
            color: var(--cream);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            padding: 8px var(--layout-padding-h);
            font-family: 'JetBrains Mono';
            font-size: 8px;
            flex-shrink: 0;
            row-gap: 2px;
            column-gap: 12px;
        }

        #display-footer-email, .pdf-footer-email    { grid-column:1; grid-row:1; justify-self:start; word-break:break-word; }
        #display-footer-linkedin, .pdf-footer-linkedin { grid-column:1; grid-row:2; justify-self:start; word-break:break-word; color:var(--cream); text-decoration:none; }
        #display-footer-phone, .pdf-footer-phone    { grid-column:2; grid-row:1; justify-self:end; word-break:break-word; }
        #display-footer-location, .pdf-footer-location { grid-column:2; grid-row:2; justify-self:end; word-break:break-word; }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-y: auto;
                overflow-x: hidden;
            }
            .sidebar {
                width: 100%;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid #222;
                overflow-y: visible;
            }
            .viewport {
                overflow: visible;
                padding: 16px 0;
                justify-content: flex-start;
                align-items: flex-start;
            }
            #canvas {
                transform: scale(0.98);
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">PROFILE</div>
        <input type="text"  id="input-name"     placeholder="NAME"                     maxlength="30"  autocomplete="name">
        <input type="text"  id="input-field"    placeholder="FIELD"                    maxlength="30"  autocomplete="off">
        <input type="text"  id="input-company"  placeholder="COMPANY"                  maxlength="50"  autocomplete="organization">
        <input type="email" id="input-email"    placeholder="EMAIL"                    maxlength="65"  autocomplete="email">
        <input type="tel"   id="input-phone"    placeholder="PHONE"                    maxlength="30"  autocomplete="tel">
        <input type="text"  id="input-location" placeholder="LOCATION"                 maxlength="30"  autocomplete="address-level1">
        <input type="text"  id="input-linkedin" placeholder="LINKEDIN"                 maxlength="65">
        <textarea           id="input-bio"      placeholder="PROFESSIONAL STATEMENT"   maxlength="600" rows="10"></textarea>
        <input type="text"  id="input-skills"   placeholder="SKILLS (comma-separated)" maxlength="350">
        <button class="export-btn" id="export-btn">EXPORT PDF</button>
    </aside>

    <main class="viewport">
        <div id="canvas">
            <div class="rib">
                <div class="rib-company" id="display-company"></div>
            </div>
            <div class="main">
                <header class="header" id="header-box">
                    <div id="display-name"></div>
                    <span id="display-field"></span>
                </header>
                <div class="divider"></div>
                <div class="body-content">
                    <section id="bio-container">
                        <span id="bio-lead"></span>
                        <span id="bio-body"></span>
                    </section>
                    <section id="skills-container">
                        <div class="skill-list" id="display-skills"></div>
                    </section>
                </div>
                <footer class="footer">
                    <span id="display-footer-email"></span>
                    <span id="display-footer-phone"></span>
                    <a    id="display-footer-linkedin" href="" target="_blank" rel="noopener noreferrer"></a>
                    <span id="display-footer-location"></span>
                </footer>
            </div>
        </div>
    </main>

    <!-- Hidden clone container for PDF export -->
    <div class="pdf-clone-container" id="pdf-clone-container"></div>

    <script>
        const CANVAS_W = 595;
        const CANVAS_H = 842;

        const config = {
            name:   { minSize: 10, maxSize: 47, minWidth: 120, maxHeight: 110 },
            bio:    { minSize: 4, baseSize: 15, maxSize: 50, step: 0.5, containerHeight: 360, leadOffset: 2 },
            skills: { minSize: 6, baseSize: 9, step: 0.5 },
            sizing: { maxAttempts: 100 },
        };

        const el = {
            inp: {
                name:     document.getElementById('input-name'),
                field:    document.getElementById('input-field'),
                company:  document.getElementById('input-company'),
                email:    document.getElementById('input-email'),
                phone:    document.getElementById('input-phone'),
                location: document.getElementById('input-location'),
                linkedin: document.getElementById('input-linkedin'),
                bio:      document.getElementById('input-bio'),
                skills:   document.getElementById('input-skills'),
            },
            out: {
                name:     document.getElementById('display-name'),
                field:    document.getElementById('display-field'),
                company:  document.getElementById('display-company'),
                bioLead:  document.getElementById('bio-lead'),
                bioBody:  document.getElementById('bio-body'),
                skills:   document.getElementById('display-skills'),
                email:    document.getElementById('display-footer-email'),
                phone:    document.getElementById('display-footer-phone'),
                linkedin: document.getElementById('display-footer-linkedin'),
                location: document.getElementById('display-footer-location'),
            },
            con: {
                header: document.getElementById('header-box'),
                bio:    document.getElementById('bio-container'),
                skills: document.getElementById('skills-container'),
            },
            canvas:    document.getElementById('canvas'),
            exportBtn: document.getElementById('export-btn'),
            cloneContainer: document.getElementById('pdf-clone-container'),
        };

        function splitBio(text) {
            if (!text) return ['', ''];
            const sentences = text.split(/(?<=[.!?])\s+/);
            const lead = sentences[0] || '';
            const body = sentences.slice(1).join(' ').trim();
            return [lead, body ? ' ' + body : ''];
        }

        function fitName() {
            const n = el.out.name, h = el.con.header;
            let size = config.name.minSize;
            n.style.fontSize = size + 'px';
            while (n.scrollWidth <= h.clientWidth - config.name.minWidth &&
                   n.scrollHeight < config.name.maxHeight &&
                   size < config.name.maxSize) {
                n.style.fontSize = (++size) + 'px';
            }
            n.style.fontSize = (size - 1) + 'px';
        }

        function fitBio() {
            const lead = el.out.bioLead, body = el.out.bioBody, box = el.con.bio;
            const [l, b] = splitBio(el.inp.bio.value);
            lead.textContent = l;
            body.textContent = b;
            if (!l) return;

            const set = s => {
                body.style.fontSize = s + 'px';
                lead.style.fontSize = (s + config.bio.leadOffset) + 'px';
            };

            let size = config.bio.baseSize, a = 0;
            set(size);
            while (box.scrollHeight > config.bio.containerHeight && size > config.bio.minSize && a++ < config.sizing.maxAttempts) set(size -= config.bio.step);
            a = 0;
            while (box.scrollHeight <= config.bio.containerHeight && size < config.bio.maxSize && a++ < config.sizing.maxAttempts) set(size += config.bio.step);
            set(size - config.bio.step);
        }

        function fitSkills() {
            const list = el.out.skills, box = el.con.skills;
            list.innerHTML = '';
            (el.inp.skills.value || '').split(',').forEach(s => {
                const t = s.trim();
                if (!t) return;
                const pill = document.createElement('span');
                pill.className = 'skill-pill';
                pill.textContent = t.toUpperCase();
                list.appendChild(pill);
            });
            let size = config.skills.baseSize, a = 0;
            list.style.fontSize = size + 'px';
            while (list.scrollHeight > box.clientHeight && size > config.skills.minSize && a++ < config.sizing.maxAttempts)
                list.style.fontSize = (size -= config.skills.step) + 'px';
        }

        function updatePreview() {
            el.out.name.textContent     = el.inp.name.value.toUpperCase();
            el.out.field.textContent    = el.inp.field.value.toUpperCase();
            el.out.company.textContent  = el.inp.company.value.toUpperCase();
            el.out.email.textContent    = el.inp.email.value;
            el.out.phone.textContent    = el.inp.phone.value;
            el.out.location.textContent = el.inp.location.value;
            const li = el.inp.linkedin.value;
            el.out.linkedin.textContent = li;
            el.out.linkedin.href = li ? (li.startsWith('http') ? li : 'https://' + li) : '';
            fitName(); fitBio(); fitSkills();
        }

        // Build a fresh clone for PDF export — completely independent
        function buildPDFClone() {
            const cloneHtml = `
                <div class="pdf-clone">
                    <div class="rib">
                        <div class="rib-company" id="clone-company"></div>
                    </div>
                    <div class="main">
                        <header class="header">
                            <div class="pdf-display-name" id="clone-name"></div>
                            <span class="pdf-display-field" id="clone-field"></span>
                        </header>
                        <div class="divider"></div>
                        <div class="body-content">
                            <section class="pdf-bio-container" id="clone-bio-container">
                                <span class="pdf-bio-lead" id="clone-bio-lead"></span>
                                <span class="pdf-bio-body" id="clone-bio-body"></span>
                            </section>
                            <section class="pdf-skills-container" id="clone-skills-container">
                                <div class="skill-list" id="clone-skills"></div>
                            </section>
                        </div>
                        <footer class="footer">
                            <span class="pdf-footer-email" id="clone-email"></span>
                            <span class="pdf-footer-phone" id="clone-phone"></span>
                            <a class="pdf-footer-linkedin" id="clone-linkedin" href="" target="_blank" rel="noopener noreferrer"></a>
                            <span class="pdf-footer-location" id="clone-location"></span>
                        </footer>
                    </div>
                </div>
            `;
            el.cloneContainer.innerHTML = cloneHtml;
            
            const clone = {
                name:     document.getElementById('clone-name'),
                field:    document.getElementById('clone-field'),
                company:  document.getElementById('clone-company'),
                bioLead:  document.getElementById('clone-bio-lead'),
                bioBody:  document.getElementById('clone-bio-body'),
                skills:   document.getElementById('clone-skills'),
                email:    document.getElementById('clone-email'),
                phone:    document.getElementById('clone-phone'),
                linkedin: document.getElementById('clone-linkedin'),
                location: document.getElementById('clone-location'),
                bioContainer: document.getElementById('clone-bio-container'),
                skillsContainer: document.getElementById('clone-skills-container'),
            };
            
            return clone;
        }

        // Apply current data to clone and fit its content
        function applyToClone(clone) {
            clone.name.textContent     = el.inp.name.value.toUpperCase();
            clone.field.textContent    = el.inp.field.value.toUpperCase();
            clone.company.textContent  = el.inp.company.value.toUpperCase();
            clone.email.textContent    = el.inp.email.value;
            clone.phone.textContent    = el.inp.phone.value;
            clone.location.textContent = el.inp.location.value;
            const li = el.inp.linkedin.value;
            clone.linkedin.textContent = li;
            clone.linkedin.href = li ? (li.startsWith('http') ? li : 'https://' + li) : '';
            
            // Fit name in clone
            let size = config.name.minSize;
            clone.name.style.fontSize = size + 'px';
            const headerWidth = 595 - 120; // approximate header width
            while (clone.name.scrollWidth <= headerWidth && clone.name.scrollHeight < config.name.maxHeight && size < config.name.maxSize) {
                clone.name.style.fontSize = (++size) + 'px';
            }
            clone.name.style.fontSize = (size - 1) + 'px';
            
            // Fit bio in clone
            const [l, b] = splitBio(el.inp.bio.value);
            clone.bioLead.textContent = l;
            clone.bioBody.textContent = b;
            if (l) {
                const setBio = s => {
                    clone.bioBody.style.fontSize = s + 'px';
                    clone.bioLead.style.fontSize = (s + config.bio.leadOffset) + 'px';
                };
                let bioSize = config.bio.baseSize, attempts = 0;
                setBio(bioSize);
                while (clone.bioContainer.scrollHeight > config.bio.containerHeight && bioSize > config.bio.minSize && attempts++ < config.sizing.maxAttempts) 
                    setBio(bioSize -= config.bio.step);
                attempts = 0;
                while (clone.bioContainer.scrollHeight <= config.bio.containerHeight && bioSize < config.bio.maxSize && attempts++ < config.sizing.maxAttempts) 
                    setBio(bioSize += config.bio.step);
                setBio(bioSize - config.bio.step);
            }
            
            // Fit skills in clone
            clone.skills.innerHTML = '';
            (el.inp.skills.value || '').split(',').forEach(s => {
                const t = s.trim();
                if (!t) return;
                const pill = document.createElement('span');
                pill.className = 'skill-pill';
                pill.textContent = t.toUpperCase();
                clone.skills.appendChild(pill);
            });
            let skillSize = config.skills.baseSize, attempts = 0;
            clone.skills.style.fontSize = skillSize + 'px';
            while (clone.skillsContainer.scrollHeight > config.skills.height && skillSize > config.skills.minSize && attempts++ < config.sizing.maxAttempts)
                clone.skills.style.fontSize = (skillSize -= config.skills.step) + 'px';
        }

        async function generatePDF() {
            if (!el.inp.name.value?.trim() || !el.inp.field.value?.trim()) {
                alert('Please fill in at least Name and Field');
                return;
            }

            const fileName = (el.inp.name.value.trim().replace(/[^a-zA-Z0-9]/g, '_') || 'portfolio') + '_Sheet.pdf';
            const btn = el.exportBtn;
            const originalText = btn.textContent;
            btn.textContent = 'GENERATING…';
            btn.disabled = true;

            try {
                // Build fresh independent clone
                const clone = buildPDFClone();
                applyToClone(clone);
                
                // Wait for DOM update
                await new Promise(r => setTimeout(r, 50));
                
                const cloneElement = document.querySelector('.pdf-clone');
                const capturedCanvas = await html2canvas(cloneElement, {
                    scale: 3,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#f3f0e5',
                    width: CANVAS_W,
                    height: CANVAS_H,
                });
                
                const imgData = capturedCanvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    unit: 'pt',
                    format: [CANVAS_W, CANVAS_H],
                    orientation: 'portrait',
                    compress: true
                });
                
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
                pdf.save(fileName);
                
            } catch (err) {
                console.error('PDF generation error:', err);
                alert('PDF export failed. Please refresh and try again.\n' + (err.message || 'Unknown error'));
            } finally {
                // Clean up clone
                el.cloneContainer.innerHTML = '';
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        Object.values(el.inp).forEach(i => i.addEventListener('input', updatePreview));
        el.exportBtn.addEventListener('click', generatePDF);
        updatePreview();
    </script>
</body>
</html>
