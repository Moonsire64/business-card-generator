<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portfolio One-Pager Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f3f0e5;
            --ink: #0a0a0a;
            --accent: #ff3e00;
            --accent-dark: #b32b00;
            --layout-header-height: 180px;
            --layout-bio-height: 360px;
            --layout-skills-height: 110px;
            --layout-footer-height: 60px;
            --layout-rib-width: 70px;
            --layout-padding-h: 60px;
            --layout-padding-v: 20px;
            --canvas-width: 595px;
            --canvas-height: 842px;
        }

        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - desktop and mobile */
        .sidebar {
            width: 320px;
            padding: 30px;
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar-title {
            font-weight: 900;
            color: var(--accent);
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        input, textarea {
            background: #111;
            border: 1px solid #222;
            padding: 10px 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            border-radius: 4px;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .export-btn {
            margin-top: 10px;
            padding: 15px;
            background: var(--accent);
            color: #fff;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            font-size: 14px;
        }

        .export-btn:active {
            transform: scale(0.98);
        }

        /* Preview area */
        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            padding: 20px;
            overflow: auto;
        }

        /* Canvas wrapper for mobile scaling */
        .canvas-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            width: 595px;
            height: 842px;
            background: var(--ink);
            display: grid;
            grid-template-columns: 70px 1fr;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .watermark {
            position: absolute;
            top: 45%;
            left: 60%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 160px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.1);
            pointer-events: none;
            white-space: nowrap;
            z-index: 1;
            font-family: 'Helvetica', sans-serif;
        }

        .rib {
            background: linear-gradient(180deg, var(--accent-dark) 0px, var(--accent-dark) 130px, var(--accent) 130px, var(--accent) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .rib-company {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            white-space: nowrap;
            font-family: 'JetBrains Mono';
            font-size: 9px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            font-weight: 700;
        }

        .main {
            background: var(--cream);
            height: 842px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: 180px;
            padding: 60px 60px 25px;
            display: flex;
            flex-direction: column;
        }

        #display-name {
            font-family: 'Archivo', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--ink);
            font-weight: 900;
            font-stretch: 125%;
        }

        #display-field {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-top: 15px;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--ink);
            margin: 20px 60px 0;
        }

        .body-content {
            flex: 1;
            padding: 20px 60px 40px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #bio-container {
            height: 360px;
            border-left: 10px solid var(--ink);
            padding-left: 30px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #bio-lead {
            font-weight: 900;
            color: var(--ink);
            display: block;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        #bio-body {
            font-weight: 400;
            color: #333;
            line-height: 1.4;
        }

        #skills-container {
            height: 110px;
            display: flex;
            align-items: flex-start;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .skill-pill {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            background: var(--ink);
            color: var(--cream);
            padding: 5px 10px;
            text-transform: uppercase;
            font-size: 9px;
            white-space: nowrap;
        }

        .footer {
            height: 60px;
            background: var(--ink);
            color: var(--cream);
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 8px 60px;
            font-family: 'JetBrains Mono';
            font-size: 8px;
            gap: 4px 12px;
        }

        .footer > * {
            white-space: pre-wrap;
            word-break: break-word;
        }

        #display-footer-email { grid-column: 1; grid-row: 1; text-align: left; }
        #display-footer-linkedin { grid-column: 1; grid-row: 2; text-align: left; color: var(--cream); text-decoration: none; }
        #display-footer-phone { grid-column: 2; grid-row: 1; text-align: right; }
        #display-footer-location { grid-column: 2; grid-row: 2; text-align: right; }

        /* Mobile: make preview scrollable and properly sized */
        @media (max-width: 750px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #222;
                padding: 20px;
            }
            
            .preview-area {
                padding: 20px;
                overflow-x: auto;
                overflow-y: visible;
                justify-content: flex-start;
            }
            
            .canvas-wrapper {
                min-width: 595px;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">PROFILE</div>
        <input type="text" id="input-name" placeholder="NAME" value="">
        <input type="text" id="input-field" placeholder="FIELD" value="">
        <input type="text" id="input-company" placeholder="COMPANY" value="">
        <input type="email" id="input-email" placeholder="EMAIL" value="">
        <input type="tel" id="input-phone" placeholder="PHONE" value="">
        <input type="text" id="input-location" placeholder="LOCATION" value="">
        <input type="text" id="input-linkedin" placeholder="LINKEDIN" value="">
        <textarea id="input-bio" placeholder="PROFESSIONAL STATEMENT" rows="8"></textarea>
        <input type="text" id="input-skills" placeholder="SKILLS (comma-separated)" value="">
        <button class="export-btn" id="export-btn">EXPORT PDF</button>
    </aside>

    <div class="preview-area">
        <div class="canvas-wrapper">
            <div id="canvas">
                <div class="watermark">DEMO</div>
                <div class="rib">
                    <div class="rib-company" id="display-company"></div>
                </div>
                <div class="main">
                    <header class="header">
                        <div id="display-name"></div>
                        <span id="display-field"></span>
                    </header>
                    <div class="divider"></div>
                    <div class="body-content">
                        <div id="bio-container">
                            <span id="bio-lead"></span>
                            <span id="bio-body"></span>
                        </div>
                        <div id="skills-container">
                            <div class="skill-list" id="display-skills"></div>
                        </div>
                    </div>
                    <div class="footer">
                        <span id="display-footer-email"></span>
                        <span id="display-footer-phone"></span>
                        <a id="display-footer-linkedin" href="#" target="_blank"></a>
                        <span id="display-footer-location"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const inputs = {
            name: document.getElementById('input-name'),
            field: document.getElementById('input-field'),
            company: document.getElementById('input-company'),
            email: document.getElementById('input-email'),
            phone: document.getElementById('input-phone'),
            location: document.getElementById('input-location'),
            linkedin: document.getElementById('input-linkedin'),
            bio: document.getElementById('input-bio'),
            skills: document.getElementById('input-skills')
        };

        const displays = {
            name: document.getElementById('display-name'),
            field: document.getElementById('display-field'),
            company: document.getElementById('display-company'),
            bioLead: document.getElementById('bio-lead'),
            bioBody: document.getElementById('bio-body'),
            skills: document.getElementById('display-skills'),
            footerEmail: document.getElementById('display-footer-email'),
            footerPhone: document.getElementById('display-footer-phone'),
            footerLinkedin: document.getElementById('display-footer-linkedin'),
            footerLocation: document.getElementById('display-footer-location')
        };

        // Split bio into lead sentence and body
        function splitBio(text) {
            if (!text) return ['', ''];
            const match = text.match(/^([^.!?]+[.!?])\s*(.*)$/s);
            if (match) {
                return [match[1].trim(), match[2].trim() ? ' ' + match[2].trim() : ''];
            }
            return [text, ''];
        }

        // Update all displayed content
        function updateDisplay() {
            // Text content
            displays.name.textContent = inputs.name.value.toUpperCase() || '';
            displays.field.textContent = inputs.field.value.toUpperCase() || '';
            displays.company.textContent = inputs.company.value.toUpperCase() || '';
            
            // Bio
            const [lead, body] = splitBio(inputs.bio.value);
            displays.bioLead.textContent = lead;
            displays.bioBody.textContent = body;
            
            // Footer
            displays.footerEmail.textContent = inputs.email.value || '';
            displays.footerPhone.textContent = inputs.phone.value || '';
            displays.footerLocation.textContent = inputs.location.value || '';
            
            const linkedinVal = inputs.linkedin.value.trim();
            if (linkedinVal) {
                displays.footerLinkedin.textContent = linkedinVal;
                displays.footerLinkedin.href = linkedinVal.startsWith('http') ? linkedinVal : 'https://' + linkedinVal;
            } else {
                displays.footerLinkedin.textContent = '';
                displays.footerLinkedin.href = '';
            }
            
            // Skills pills
            displays.skills.innerHTML = '';
            const skillsText = inputs.skills.value.trim();
            if (skillsText) {
                skillsText.split(',').forEach(skill => {
                    const trimmed = skill.trim();
                    if (trimmed) {
                        const pill = document.createElement('span');
                        pill.className = 'skill-pill';
                        pill.textContent = trimmed.toUpperCase();
                        displays.skills.appendChild(pill);
                    }
                });
            }
            
            // Dynamic font sizing for name
            const nameEl = displays.name;
            let fontSize = 32;
            nameEl.style.fontSize = fontSize + 'px';
            while (nameEl.scrollWidth > 475 && fontSize > 20) {
                fontSize--;
                nameEl.style.fontSize = fontSize + 'px';
            }
            while (nameEl.scrollWidth < 400 && fontSize < 47) {
                fontSize++;
                nameEl.style.fontSize = fontSize + 'px';
            }
            
            // Dynamic bio sizing
            const bioContainer = document.getElementById('bio-container');
            const bioLeadEl = displays.bioLead;
            const bioBodyEl = displays.bioBody;
            
            if (lead) {
                let bodySize = 14;
                bioBodyEl.style.fontSize = bodySize + 'px';
                bioLeadEl.style.fontSize = (bodySize + 3) + 'px';
                
                while (bioContainer.scrollHeight > 360 && bodySize > 9) {
                    bodySize -= 0.5;
                    bioBodyEl.style.fontSize = bodySize + 'px';
                    bioLeadEl.style.fontSize = (bodySize + 3) + 'px';
                }
            }
        }

        // Debounced update
        let updateTimeout;
        function handleInput() {
            clearTimeout(updateTimeout);
            updateTimeout = setTimeout(updateDisplay, 50);
        }

        // Add event listeners
        Object.values(inputs).forEach(input => {
            if (input) input.addEventListener('input', handleInput);
        });

        // PDF Generation - FIXED: no white line
        async function generatePDF() {
            const name = inputs.name.value.trim();
            if (!name || !inputs.field.value.trim()) {
                alert('Please fill in Name and Field');
                return;
            }
            
            const btn = document.getElementById('export-btn');
            const originalText = btn.textContent;
            btn.textContent = 'GENERATING...';
            btn.disabled = true;
            
            try {
                const canvas = document.getElementById('canvas');
                
                // Capture with html2canvas at high resolution
                const capturedCanvas = await html2canvas(canvas, {
                    scale: 2.5,
                    backgroundColor: '#f3f0e5',
                    logging: false,
                    useCORS: false,
                    windowWidth: 595,
                    windowHeight: 842
                });
                
                // Get image data and crop exactly to 595x842 to remove any white line
                const imgData = capturedCanvas.toDataURL('image/jpeg', 1.0);
                
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    unit: 'px',
                    format: [595, 842],
                    orientation: 'portrait'
                });
                
                // Add image - use exact dimensions to fill page completely
                pdf.addImage(imgData, 'JPEG', 0, 0, 595, 842, null, 'FAST');
                pdf.save(name.replace(/[^a-z0-9]/gi, '_') + '_Portfolio.pdf');
                
            } catch (error) {
                console.error(error);
                alert('PDF generation failed. Please try again.');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // Export button
        document.getElementById('export-btn').addEventListener('click', generatePDF);
        
        // Initial update
        updateDisplay();
    </script>
</body>
</html>
