<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portfolio One-Pager Builder | Mobile Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,900&family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-rendering: geometricPrecision;
        }

        /* Desktop-first base variables */
        :root {
            --cream: #f3f0e5;
            --ink: #0a0a0a;
            --accent: #ff3e00;
            --accent-dark: #b32b00;
            --layout-header-height: 180px;
            --layout-bio-height: 360px;
            --layout-skills-height: 110px;
            --layout-footer-height: 60px;
            --layout-rib-width: 70px;
            --layout-padding-h: 60px;
            --layout-padding-v: 20px;
            --canvas-width: 595px;
            --canvas-height: 842px;
        }

        html, body {
            height: 100%;
            background: #000;
        }

        body {
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }

        /* SIDEBAR (desktop + mobile adapted) */
        .sidebar {
            width: 360px;
            padding: 40px;
            background: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-weight: 900;
            color: var(--accent);
            font-size: 14px;
            letter-spacing: 1px;
        }

        input, textarea {
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            color: #fff;
            font-size: 13px;
            outline: none;
            border-radius: 4px;
            font-family: 'Inter', monospace;
            font-weight: 400;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .export-btn {
            margin-top: 10px;
            padding: 20px;
            background: var(--accent);
            color: #fff;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.2s;
            font-size: 16px;
        }

        .export-btn:active { transform: scale(0.98); }

        /* VIEWPORT: central preview area */
        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #080808;
            overflow: auto;
            padding: 20px;
        }

        /* CANVAS: exact A4 proportions for PDF generation */
        #canvas {
            width: var(--canvas-width);
            height: var(--canvas-height);
            background: var(--ink);
            display: grid;
            grid-template-columns: var(--layout-rib-width) 1fr;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        /* watermark only visible on screen preview but not harming pdf */
        .watermark {
            position: absolute;
            top: 45%;
            left: 60%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 180px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.11);
            pointer-events: none;
            white-space: nowrap;
            z-index: 1;
            font-family: 'Helvetica', sans-serif;
        }

        .rib {
            background: linear-gradient(180deg, var(--accent-dark) 0px, var(--accent-dark) 130px, var(--accent) 130px, var(--accent) 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset -8px 0 20px rgba(0,0,0,0.4), inset 4px 0 10px rgba(255,255,255,0.1);
        }

        .rib::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .rib-company {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-90deg);
            white-space: nowrap;
            font-family: 'JetBrains Mono';
            font-size: 9px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 6px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .main {
            background: var(--cream);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            height: var(--layout-header-height);
            padding: 60px var(--layout-padding-h) 25px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        #display-name {
            font-family: 'Archivo', sans-serif;
            line-height: 0.85;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: var(--ink);
            font-weight: 900;
            font-stretch: 125%;
            word-break: break-word;
        }

        #display-field {
            font-family: 'JetBrains Mono';
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-top: 15px;
            display: block;
            font-weight: 700;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: var(--ink);
            margin: 20px var(--layout-padding-h) 0;
            flex-shrink: 0;
        }

        .body-content {
            flex: 1;
            padding: var(--layout-padding-v) var(--layout-padding-h) 40px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #bio-container {
            height: var(--layout-bio-height);
            border-left: 10px solid var(--ink);
            padding-left: 30px;
            padding-bottom: 15px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        #bio-lead {
            font-weight: 900;
            color: var(--ink);
            display: block;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        #bio-body {
            font-weight: 400;
            color: #333;
            line-height: 1.4;
            display: block;
        }

        #skills-container {
            height: var(--layout-skills-height);
            display: flex;
            align-items: flex-start;
            padding-bottom: 10px;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
        }

        .skill-pill {
            font-family: 'JetBrains Mono';
            font-weight: 700;
            background: var(--ink);
            color: var(--cream);
            padding: 5px 10px;
            text-transform: uppercase;
            white-space: nowrap;
            font-size: 9px;
        }

        .footer {
            height: var(--layout-footer-height);
            background: var(--ink);
            color: var(--cream);
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            align-items: center;
            justify-items: stretch;
            padding: 8px var(--layout-padding-h);
            font-family: 'JetBrains Mono';
            font-size: 8px;
            flex-shrink: 0;
            row-gap: 2px;
            column-gap: 12px;
        }

        #display-footer-email, #display-footer-linkedin, #display-footer-phone, #display-footer-location {
            white-space: pre-wrap;
            word-break: break-word;
        }

        #display-footer-linkedin {
            color: var(--cream);
            text-decoration: none;
        }

        /* --- CRITICAL MOBILE FIX: separate layout that does NOT shrink canvas visually, but handles overflow & ensures PDF capture --- */
        @media (max-width: 780px) {
            body {
                flex-direction: column;
                height: auto;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid #222;
                max-height: none;
                overflow-y: visible;
            }

            .viewport {
                flex: none;
                align-items: center !important;
                justify-content: center !important;
                background: #080808;
                padding: 30px 15px !important;
                min-height: auto;
                overflow-x: auto;
                overflow-y: visible;
            }

            /* Preserve original canvas dimensions (595x842) but allow horizontal scroll on mobile if needed */
            #canvas {
                width: 595px !important;
                height: 842px !important;
                min-width: 595px;
                min-height: 842px;
                margin: 0 auto;
                transform: scale(1);
                box-shadow: 0 12px 30px rgba(0,0,0,0.5);
                /* Force exact A4 sizing for HTML2PDF to render properly */
            }

            /* Ensure main internal layout uses fixed pixel values from root variables */
            .main, .header, .body-content, .footer {
                width: 100%;
            }

            /* Adjust internal spacing for readability but preserve exact heights as desktop for PDF integrity */
            .header {
                padding: 60px var(--layout-padding-h) 25px !important;
                height: var(--layout-header-height) !important;
            }

            .divider {
                margin: 20px var(--layout-padding-h) 0 !important;
            }

            .body-content {
                padding: var(--layout-padding-v) var(--layout-padding-h) 40px !important;
                margin-top: 25px !important;
            }

            #bio-container {
                height: var(--layout-bio-height) !important;
                margin-bottom: 40px !important;
                overflow: hidden !important;
            }

            #skills-container {
                height: var(--layout-skills-height) !important;
            }

            .footer {
                height: var(--layout-footer-height) !important;
                padding: 8px var(--layout-padding-h) !important;
                grid-template-columns: 1fr 1fr !important;
            }

            .watermark {
                display: block !important; /* keep watermark but doesn't affect PDF generation */
            }

            /* Improve text readability on mobile but keep font sizes adaptive */
            #display-name {
                font-size: calc(28px + 2vw);
                max-font-size: 47px;
            }
        }

        /* extra small devices: allow scrolling, but still preserve canvas dimensions */
        @media (max-width: 640px) {
            .viewport {
                padding: 20px 10px !important;
                justify-content: center;
            }
            #canvas {
                width: 595px !important;
                height: 842px !important;
                transform: scale(0.98);
                transform-origin: center;
            }
        }

        /* desktop re-iteration: ensures nothing broken */
        @media (min-width: 781px) {
            .viewport {
                overflow: visible;
            }
            #canvas {
                width: var(--canvas-width);
                height: var(--canvas-height);
                transform: none;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-title">✧ PROFILE EDITOR</div>
        <input type="text" id="input-name" placeholder="FULL NAME" aria-label="Full name" value="MAYA RIVERA" maxlength="40" autocomplete="name">
        <input type="text" id="input-field" placeholder="FIELD / ROLE" aria-label="Professional field" value="CREATIVE TECHNOLOGIST" maxlength="40" autocomplete="off">
        <input type="text" id="input-company" placeholder="COMPANY / BRAND" aria-label="Company name" value="NOVA STUDIO" maxlength="50" autocomplete="organization">
        <input type="email" id="input-email" placeholder="EMAIL" aria-label="Email address" value="hello@maya.design" maxlength="65" autocomplete="email">
        <input type="tel" id="input-phone" placeholder="PHONE" aria-label="Phone number" value="+1 (212) 555 0987" maxlength="30" autocomplete="tel">
        <input type="text" id="input-location" placeholder="LOCATION" aria-label="Location" value="NEW YORK / REMOTE" maxlength="30" autocomplete="address-level1">
        <input type="text" id="input-linkedin" placeholder="LINKEDIN URL" aria-label="LinkedIn URL" value="linkedin.com/in/mayarivera" maxlength="65">
        <textarea id="input-bio" placeholder="PROFESSIONAL STATEMENT (First sentence becomes bold lead)" aria-label="Professional statement" rows="6" maxlength="700">I build immersive digital experiences that blur the line between art and code. With over 8 years of experience in interactive design, WebGL, and creative direction, I lead projects that demand both technical precision and conceptual boldness. My work has been featured in international exhibitions and commercial campaigns for top lifestyle brands.</textarea>
        <input type="text" id="input-skills" placeholder="SKILLS (comma separated)" aria-label="Skills list" value="WebGL, Three.js, Creative Coding, UI/UX, React, GSAP, Brand Strategy, Framer" maxlength="350">
        <button class="export-btn" id="export-btn" aria-label="Export portfolio as PDF">⚡ EXPORT PDF ⚡</button>
        <div style="font-size: 11px; color: #555; text-align: center; margin-top: 10px;">Preview fits A4 — PDF export preserves layout</div>
    </aside>

    <main class="viewport">
        <div id="canvas">
            <div class="watermark">DEMO</div>
            <div class="rib">
                <div class="rib-company" id="display-company"></div>
            </div>
            <div class="main">
                <header class="header" id="header-box">
                    <div id="display-name"></div>
                    <span id="display-field"></span>
                </header>
                <div class="divider"></div>
                <div class="body-content">
                    <section id="bio-container">
                        <span id="bio-lead"></span>
                        <span id="bio-body"></span>
                    </section>
                    <section id="skills-container">
                        <div class="skill-list" id="display-skills"></div>
                    </section>
                </div>
                <footer class="footer">
                    <span id="display-footer-email"></span>
                    <span id="display-footer-phone"></span>
                    <a id="display-footer-linkedin" href="" target="_blank" rel="noopener noreferrer"></a>
                    <span id="display-footer-location"></span>
                </footer>
            </div>
        </div>
    </main>

    <script>
        (function() {
            // DOM references
            const inputs = {
                name: document.getElementById('input-name'),
                field: document.getElementById('input-field'),
                company: document.getElementById('input-company'),
                email: document.getElementById('input-email'),
                phone: document.getElementById('input-phone'),
                location: document.getElementById('input-location'),
                linkedin: document.getElementById('input-linkedin'),
                bio: document.getElementById('input-bio'),
                skills: document.getElementById('input-skills'),
            };

            const displays = {
                name: document.getElementById('display-name'),
                field: document.getElementById('display-field'),
                company: document.getElementById('display-company'),
                bioLead: document.getElementById('bio-lead'),
                bioBody: document.getElementById('bio-body'),
                skills: document.getElementById('display-skills'),
                footerEmail: document.getElementById('display-footer-email'),
                footerPhone: document.getElementById('display-footer-phone'),
                footerLinkedin: document.getElementById('display-footer-linkedin'),
                footerLocation: document.getElementById('display-footer-location'),
            };

            const containers = {
                header: document.getElementById('header-box'),
                bio: document.getElementById('bio-container'),
                skills: document.getElementById('skills-container'),
            };

            const exportBtn = document.getElementById('export-btn');

            // Helper: split bio into lead sentence + body
            function splitBioText(text) {
                if (!text || text.trim() === '') return ['', ''];
                // split on sentence boundaries . ! ? followed by space
                const sentences = text.match(/[^.!?]+[.!?]+|.+$/g);
                if (!sentences || sentences.length === 0) return [text, ''];
                const lead = sentences[0].trim();
                const rest = sentences.slice(1).join(' ').trim();
                return [lead, rest ? ' ' + rest : ''];
            }

            // Dynamic font fitting for name (preserve desktop & mobile harmony)
            function fitNameText() {
                const nameEl = displays.name;
                const headerEl = containers.header;
                if (!nameEl || !headerEl) return;

                const rawName = inputs.name.value.trim();
                nameEl.style.fontSize = ''; // reset
                let size = 32; // start mid-range
                nameEl.style.fontSize = size + 'px';

                const maxWidth = headerEl.clientWidth - 40; // safety margin
                const maxHeight = 110;
                let minSize = 20;
                let maxSize = 52;

                // shrink if overflow
                while ((nameEl.scrollWidth > maxWidth || nameEl.scrollHeight > maxHeight) && size > minSize) {
                    size -= 2;
                    nameEl.style.fontSize = size + 'px';
                }
                // grow if space
                while (nameEl.scrollWidth < maxWidth - 20 && nameEl.scrollHeight < maxHeight - 10 && size < maxSize) {
                    size += 2;
                    nameEl.style.fontSize = size + 'px';
                    if (nameEl.scrollWidth > maxWidth || nameEl.scrollHeight > maxHeight) {
                        size -= 2;
                        nameEl.style.fontSize = size + 'px';
                        break;
                    }
                }
                // clamp readability
                nameEl.style.fontSize = Math.max(24, Math.min(52, size)) + 'px';
            }

            // Bio dynamic height adjust (strict to 360px)
            function fitBioText() {
                const bioLeadEl = displays.bioLead;
                const bioBodyEl = displays.bioBody;
                const bioContainer = containers.bio;
                const rawBio = inputs.bio.value;

                const [lead, body] = splitBioText(rawBio);
                bioLeadEl.textContent = lead;
                bioBodyEl.textContent = body;

                if (!lead && !body) {
                    bioLeadEl.textContent = '';
                    bioBodyEl.textContent = '';
                    return;
                }

                // initial sizes
                let bodyFontSize = 14;
                let leadFontSize = 17;

                bioBodyEl.style.fontSize = bodyFontSize + 'px';
                bioLeadEl.style.fontSize = leadFontSize + 'px';

                const targetHeight = 360; // fixed as per design
                let attempts = 0;
                const maxAttempts = 35;

                // Shrink if overflowing
                while (bioContainer.scrollHeight > targetHeight + 8 && bodyFontSize > 9 && attempts < maxAttempts) {
                    bodyFontSize -= 0.6;
                    leadFontSize = bodyFontSize + 3;
                    bioBodyEl.style.fontSize = bodyFontSize + 'px';
                    bioLeadEl.style.fontSize = leadFontSize + 'px';
                    attempts++;
                }
                // Expand if too small and there's headroom
                attempts = 0;
                while (bioContainer.scrollHeight < targetHeight - 20 && bodyFontSize < 20 && attempts < maxAttempts) {
                    bodyFontSize += 0.6;
                    leadFontSize = bodyFontSize + 3;
                    bioBodyEl.style.fontSize = bodyFontSize + 'px';
                    bioLeadEl.style.fontSize = leadFontSize + 'px';
                    if (bioContainer.scrollHeight > targetHeight + 5) {
                        bodyFontSize -= 0.6;
                        leadFontSize = bodyFontSize + 3;
                        bioBodyEl.style.fontSize = bodyFontSize + 'px';
                        bioLeadEl.style.fontSize = leadFontSize + 'px';
                        break;
                    }
                    attempts++;
                }
                // final clamping for consistency
                bioBodyEl.style.fontSize = Math.min(19, Math.max(9.5, bodyFontSize)) + 'px';
                bioLeadEl.style.fontSize = (parseFloat(bioBodyEl.style.fontSize) + 3) + 'px';
            }

            // Skills pills rendering + dynamic font scaling to fit skills container height (110px)
            function fitSkillsText() {
                const skillsListEl = displays.skills;
                const skillsContainer = containers.skills;
                const skillsRaw = inputs.skills.value;

                skillsListEl.innerHTML = '';
                if (skillsRaw.trim()) {
                    const skillsArray = skillsRaw.split(',').map(s => s.trim()).filter(s => s);
                    skillsArray.forEach(skill => {
                        const pill = document.createElement('span');
                        pill.className = 'skill-pill';
                        pill.textContent = skill.toUpperCase();
                        skillsListEl.appendChild(pill);
                    });
                }

                if (!skillsListEl.children.length) {
                    skillsListEl.innerHTML = '<span class="skill-pill" style="opacity:0.5;">—</span>';
                }

                let fontSize = 9.5;
                skillsListEl.style.fontSize = fontSize + 'px';
                const maxHeight = containers.skills.clientHeight || 110;
                let attempts = 0;
                // shrink if overflow
                while (skillsListEl.scrollHeight > maxHeight + 5 && fontSize > 6.5 && attempts < 20) {
                    fontSize -= 0.5;
                    skillsListEl.style.fontSize = fontSize + 'px';
                    attempts++;
                }
                // slight grow if very compact but not necessary
                if (skillsListEl.scrollHeight < maxHeight - 20 && fontSize < 13 && skillsListEl.children.length > 2) {
                    let newSize = fontSize + 0.8;
                    skillsListEl.style.fontSize = newSize + 'px';
                    if (skillsListEl.scrollHeight > maxHeight + 2) {
                        skillsListEl.style.fontSize = fontSize + 'px';
                    } else {
                        fontSize = newSize;
                    }
                }
                // ensure all pills wrap nicely and font is legible
                skillsListEl.style.fontSize = Math.max(7, Math.min(13, fontSize)) + 'px';
            }

            // Full UI update
            function updateAll() {
                // update textual content
                displays.name.textContent = inputs.name.value.toUpperCase() || ' ';
                displays.field.textContent = inputs.field.value.toUpperCase() || '';
                displays.company.textContent = inputs.company.value.toUpperCase() || '';

                // footer fields
                displays.footerEmail.textContent = inputs.email.value || '';
                displays.footerPhone.textContent = inputs.phone.value || '';
                displays.footerLocation.textContent = inputs.location.value || '';

                const linkedinRaw = inputs.linkedin.value.trim();
                if (linkedinRaw) {
                    let hrefValue = linkedinRaw;
                    if (!linkedinRaw.startsWith('http://') && !linkedinRaw.startsWith('https://')) {
                        hrefValue = 'https://' + linkedinRaw;
                    }
                    displays.footerLinkedin.href = hrefValue;
                    displays.footerLinkedin.textContent = linkedinRaw;
                } else {
                    displays.footerLinkedin.href = '';
                    displays.footerLinkedin.textContent = '';
                }

                // force font recalc (use requestAnimationFrame to avoid layout thrash)
                requestAnimationFrame(() => {
                    fitNameText();
                    fitBioText();
                    fitSkillsText();
                });
            }

            // Debouncer for live editing
            let debounceTimer;
            function debouncedUpdate() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    updateAll();
                }, 60);
            }

            // Attach event listeners
            function bindEvents() {
                for (let key in inputs) {
                    if (inputs[key]) {
                        inputs[key].addEventListener('input', debouncedUpdate);
                        inputs[key].addEventListener('change', debouncedUpdate);
                    }
                }
                window.addEventListener('resize', () => {
                    debouncedUpdate();
                });
                // also update on orientation change (mobile)
                window.addEventListener('orientationchange', () => {
                    setTimeout(debouncedUpdate, 50);
                });
            }

            // PDF Export fix: ensures canvas remains un-scaled and uses fixed dimensions to avoid blank PDF on mobile.
            function generatePDF() {
                const nameVal = inputs.name.value.trim();
                const fieldVal = inputs.field.value.trim();
                if (!nameVal || !fieldVal) {
                    alert('Please fill at least Name and Field before exporting.');
                    return;
                }

                const canvasElem = document.getElementById('canvas');
                if (!canvasElem) {
                    alert('Canvas not found.');
                    return;
                }

                // Mobile fix: temporary force style to original dimensions before capturing
                const originalWidth = canvasElem.style.width;
                const originalHeight = canvasElem.style.height;
                const originalOverflow = document.body.style.overflow;
                
                // Ensure canvas has proper dimensions for html2pdf on mobile (some browsers require explicit)
                canvasElem.style.width = '595px';
                canvasElem.style.height = '842px';
                // Avoid body scroll interference during capture
                document.body.style.overflow = 'hidden';
                
                // Small delay to apply style
                setTimeout(() => {
                    try {
                        const opt = {
                            margin: 0,
                            filename: `${nameVal.replace(/[^a-z0-9]/gi, '_')}_Portfolio.pdf`,
                            image: { type: 'jpeg', quality: 0.98 },
                            html2canvas: { scale: 2.5, useCORS: false, logging: false, letterRendering: true },
                            jsPDF: { unit: 'px', format: [595, 842], orientation: 'portrait' }
                        };
                        html2pdf().set(opt).from(canvasElem).save().then(() => {
                            // revert after save
                            canvasElem.style.width = originalWidth || '';
                            canvasElem.style.height = originalHeight || '';
                            document.body.style.overflow = originalOverflow || '';
                        }).catch(err => {
                            console.error('PDF error', err);
                            canvasElem.style.width = originalWidth || '';
                            canvasElem.style.height = originalHeight || '';
                            document.body.style.overflow = originalOverflow || '';
                            alert('PDF generation failed, please retry.');
                        });
                    } catch (err) {
                        canvasElem.style.width = originalWidth || '';
                        canvasElem.style.height = originalHeight || '';
                        document.body.style.overflow = originalOverflow || '';
                        alert('Export error: ' + err.message);
                    }
                }, 80);
            }

            // manual update after initial load
            function init() {
                bindEvents();
                updateAll();
                exportBtn.addEventListener('click', generatePDF);
                // Additional mutation observer to ensure after images/fonts load
                setTimeout(() => {
                    updateAll();
                }, 200);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
